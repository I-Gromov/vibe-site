<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GGSEL — Тест для сотрудников</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="/"><img src="logo-ggsel.svg" alt="GGSEL" height="28" /></a>
      <div class="header-meta">Внутреннее тестирование</div>
    </div>
  </header>

  <main class="container">

    <section class="hero">
      <h1>Тест для сотрудников</h1>
      <p class="hero-sub">Выбери один из четырёх вариантов, затем нажми «Проверить ответ». Без спешки.</p>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="progress-label" id="progressLabel">0 / 0 вопросов открыто</div>
    </section>

    <p id="quizError" class="quiz-error" hidden></p>
    <div id="quizSections"></div>

  </main>

  <footer class="site-footer">
    <p>GGSEL · Внутренний портал · 2026 · <a class="footer-link" href="admin.html">Редактирование вопросов</a></p>
  </footer>

  <aside class="side-panel">
    <nav class="side-nav" id="filterNav"></nav>
    <div class="side-progress">
      <div class="side-progress-track">
        <div class="side-progress-fill" id="sideProgressBar"></div>
      </div>
      <div class="side-progress-label" id="sideProgressLabel">0%</div>
    </div>
  </aside>

  <script src="script.js"></script>
</body>
</html>
